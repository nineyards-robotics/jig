parameters:
    message_prefix:
        type: string
        default_value: "echo"
        description: "Prefix prepended to all echoed messages"
        read_only: true
    publish_rate_ms:
        type: int
        default_value: 100
        description: "Timer publish rate in milliseconds"
        read_only: true
    queue_depth:
        type: int
        default_value: 10
        description: "Queue depth for publishers/subscribers"
        read_only: true

publishers:
    - topic: output
      type: std_msgs/msg/String
      qos:
        history: ${param:queue_depth}
        reliability: RELIABLE
    - topic: "${param:message_prefix}/prefixed_output"
      field_name: prefixed_output
      type: std_msgs/msg/String
      qos:
        history: 10
        reliability: RELIABLE

subscribers:
    - topic: input
      type: std_msgs/msg/String
      qos:
        history: ${param:queue_depth}
        reliability: RELIABLE

services:
    - name: add_two_ints
      type: example_interfaces/srv/AddTwoInts
    - name: get_counter
      type: example_interfaces/srv/Trigger

service_clients:
    - name: remote_trigger
      type: example_interfaces/srv/Trigger
