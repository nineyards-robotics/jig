subscribers:
    - topic: heartbeat
      type: std_msgs/msg/Bool
      qos:
        history: 1
        reliability: RELIABLE
        deadline_ms: 500
        liveliness: AUTOMATIC
        lease_duration_ms: 500

publishers:
