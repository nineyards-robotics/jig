name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy, kilted]
      fail-fast: false
    name: build (${{ matrix.ros_distro }})
    steps:
      - uses: actions/checkout@v4

      - name: Run Dagger build-and-test
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: build-and-test --src=. --ros-distro=${{ matrix.ros_distro }}
