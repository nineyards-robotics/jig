name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dagger lint
        uses: dagger/dagger-for-github@v8
        with:
          version: "0.20.3"
          verb: call
          module: .
          args: lint --src=.
