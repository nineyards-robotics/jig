node:
  name: qos_param_substitution
  package: test_package
  plugin: test_package::QosParamSubstitution
parameters:
  sensor_queue_depth:
    type: int
    default_value: 20
    read_only: true
    description: Queue depth for sensor data
  sensor_reliability:
    type: string
    default_value: RELIABLE
    read_only: true
    description: Reliability policy for sensor data
  sensor_durability:
    type: string
    default_value: VOLATILE
    read_only: true
    description: Durability policy for sensor data
  sensor_liveliness:
    type: string
    default_value: AUTOMATIC
    read_only: true
    description: Liveliness policy for sensor data
  sensor_deadline_ms:
    type: int
    default_value: 100
    read_only: true
    description: Deadline for sensor data in milliseconds
  output_queue_depth:
    type: int
    default_value: 5
    read_only: true
    description: Queue depth for output
  autostart:
    type: bool
    default_value: true
    description: Automatically configure and activate the node on startup
    read_only: true
subscribers:
- topic: /sensor_data
  type: sensor_msgs/msg/LaserScan
  qos:
    history: ${param:sensor_queue_depth}
    reliability: ${param:sensor_reliability}
    durability: ${param:sensor_durability}
    liveliness: ${param:sensor_liveliness}
    deadline_ms: ${param:sensor_deadline_ms}
publishers:
- topic: /processed_data
  type: std_msgs/msg/String
  qos:
    history: ${param:output_queue_depth}
    reliability: RELIABLE
- topic: ~/transition_event
  type: lifecycle_msgs/msg/TransitionEvent
- topic: ~/state
  type: lifecycle_msgs/msg/State
- topic: /parameter_events
  type: rcl_interfaces/msg/ParameterEvent
- topic: /rosout
  type: rcl_interfaces/msg/Log
services:
- name: ~/change_state
  type: lifecycle_msgs/srv/ChangeState
- name: ~/get_state
  type: lifecycle_msgs/srv/GetState
- name: ~/get_available_states
  type: lifecycle_msgs/srv/GetAvailableStates
- name: ~/get_available_transitions
  type: lifecycle_msgs/srv/GetAvailableTransitions
- name: ~/get_transition_graph
  type: lifecycle_msgs/srv/GetTransitionGraph
- name: ~/describe_parameters
  type: rcl_interfaces/srv/DescribeParameters
- name: ~/get_parameters
  type: rcl_interfaces/srv/GetParameters
- name: ~/get_parameter_types
  type: rcl_interfaces/srv/GetParameterTypes
- name: ~/list_parameters
  type: rcl_interfaces/srv/ListParameters
- name: ~/set_parameters
  type: rcl_interfaces/srv/SetParameters
- name: ~/set_parameters_atomically
  type: rcl_interfaces/srv/SetParametersAtomically
- name: ~/get_type_description
  type: type_description_interfaces/srv/GetTypeDescription
