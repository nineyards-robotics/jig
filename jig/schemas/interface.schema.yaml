$schema: https://json-schema.org/draft/2020-12/schema
title: Jig Node Interface
description: Schema for Jig ROS2 node interface YAML files
type: object
additionalProperties: false

properties:
  node:
    $ref: "#/$defs/node"
  parameters:
    type: object
    description: ROS parameters for generate_parameter_library (see parameter.schema.yaml)
    additionalProperties:
      $ref: "parameter.schema.yaml#/$defs/parameter_definition"
  publishers:
    type: array
    description: List of topic publishers
    items:
      $ref: "#/$defs/publisher"
  subscribers:
    type: array
    description: List of topic subscribers and sync groups
    items:
      oneOf:
        - $ref: "#/$defs/subscriber"
        - $ref: "#/$defs/syncGroup"
  services:
    type: array
    description: List of service servers
    items:
      $ref: "#/$defs/service"
  service_clients:
    type: array
    description: List of service clients
    items:
      $ref: "#/$defs/serviceClient"
  actions:
    type: array
    description: List of action servers
    items:
      $ref: "#/$defs/action"
  action_clients:
    type: array
    description: List of action clients
    items:
      $ref: "#/$defs/actionClient"
  tf:
    $ref: "#/$defs/tf"

$defs:
  # Parameter reference pattern: ${param:parameter_name}
  parameterRef:
    type: string
    pattern: '^\$\{param:[a-zA-Z_][a-zA-Z0-9_]*\}$'

  # Topic/service/action name that may contain ${param:name} or ${for_each_param:name} references
  topicNameWithParams:
    type: string
    description: "Topic/service/action name that may contain ${param:name} or ${for_each_param:name} references. Use ${for_each_param:name} with a string_array parameter to generate a map/dict of entities keyed by parameter values."
    pattern: '^[a-zA-Z0-9/_~${}: ]+$'

  node:
    type: object
    description: "Node metadata. Optional: name and package default to build-system-provided values when omitted."
    additionalProperties: false
    properties:
      name:
        type: string
        description: "Node name. Optional: defaults to the --node-name CLI arg provided by the build system. Use ${THIS_NODE} for backward compatibility."
        pattern: ^(\$\{THIS_NODE\}|[a-zA-Z][a-zA-Z0-9_]*)$
      package:
        type: string
        description: "Package name. Optional: defaults to the --package CLI arg provided by the build system. Use ${THIS_PACKAGE} for backward compatibility."
        pattern: ^(\$\{THIS_PACKAGE\}|[a-zA-Z][a-zA-Z0-9_]*)$

  topicName:
    type: string
    description: "ROS topic name. Valid characters: letters, digits, forward slash (/), underscore (_), tilde (~)"
    pattern: ^[a-zA-Z0-9/_~]+$

  rosMessageType:
    type: string
    description: "ROS message type in format: package/msg/TypeName"
    pattern: ^[a-zA-Z][a-zA-Z0-9_]*/msg/[A-Z][a-zA-Z0-9]*$
    examples:
      - std_msgs/msg/String
      - geometry_msgs/msg/Twist
      - sensor_msgs/msg/JointState

  rosServiceType:
    type: string
    description: "ROS service type in format: package/srv/TypeName"
    pattern: ^[a-zA-Z][a-zA-Z0-9_]*/srv/[A-Z][a-zA-Z0-9]*$
    examples:
      - std_srvs/srv/Trigger
      - example_interfaces/srv/AddTwoInts

  rosActionType:
    type: string
    description: "ROS action type in format: package/action/TypeName"
    pattern: ^[a-zA-Z][a-zA-Z0-9_]*/action/[A-Z][a-zA-Z0-9]*$
    examples:
      - example_interfaces/action/Fibonacci
      - nav2_msgs/action/NavigateToPose

  qos:
    type: object
    description: QoS configuration for publishers and subscribers. Fields can use ${param:name} to reference read_only parameters.
    additionalProperties: false
    required:
      - history
      - reliability
    properties:
      history:
        description: "History policy: positive integer for KEEP_LAST(n), 'ALL' for KEEP_ALL, or ${param:name} reference"
        oneOf:
          - type: integer
            minimum: 1
          - const: "ALL"
          - $ref: "#/$defs/parameterRef"
      reliability:
        description: "Reliability policy or ${param:name} reference"
        oneOf:
          - enum: [BEST_EFFORT, RELIABLE]
          - $ref: "#/$defs/parameterRef"
      durability:
        description: "Durability policy or ${param:name} reference"
        oneOf:
          - enum: [TRANSIENT_LOCAL, VOLATILE]
          - $ref: "#/$defs/parameterRef"
      deadline_ms:
        description: "Deadline duration in milliseconds or ${param:name} reference"
        oneOf:
          - type: integer
            minimum: 0
          - $ref: "#/$defs/parameterRef"
      lifespan_ms:
        description: "Lifespan duration in milliseconds or ${param:name} reference"
        oneOf:
          - type: integer
            minimum: 0
          - $ref: "#/$defs/parameterRef"
      liveliness:
        description: "Liveliness policy or ${param:name} reference"
        oneOf:
          - enum: [AUTOMATIC, MANUAL_BY_TOPIC]
          - $ref: "#/$defs/parameterRef"
      lease_duration_ms:
        description: "Liveliness lease duration in milliseconds or ${param:name} reference"
        oneOf:
          - type: integer
            minimum: 0
          - $ref: "#/$defs/parameterRef"

  publisher:
    type: object
    description: Topic publisher definition
    required:
      - topic
      - type
      - qos
    additionalProperties: false
    properties:
      topic:
        $ref: "#/$defs/topicNameWithParams"
        description: Topic name to publish on (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when topic contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosMessageType"
        description: ROS message type
      qos:
        $ref: "#/$defs/qos"
        description: QoS configuration (required for publishers)
      manually_created:
        type: boolean
        description: If true, skip code generation for this publisher (for documentation only)
        default: false
    if:
      properties:
        manually_created:
          const: true
      required:
        - manually_created
    then:
      required:
        - topic

  subscriber:
    type: object
    description: Topic subscriber definition
    required:
      - topic
      - type
      - qos
    additionalProperties: false
    properties:
      topic:
        $ref: "#/$defs/topicNameWithParams"
        description: Topic name to subscribe to (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when topic contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosMessageType"
        description: ROS message type
      qos:
        $ref: "#/$defs/qos"
        description: QoS configuration (required for subscribers)
      manually_created:
        type: boolean
        description: If true, skip code generation for this subscriber (for documentation only)
        default: false

  syncGroup:
    type: object
    description: "Synchronise multiple topics by timestamp using message_filters"
    required:
      - name
      - policy
      - queue_size
      - topics
    additionalProperties: false
    properties:
      name:
        type: string
        description: "Field name for this sync group in generated code"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      policy:
        enum: [approximate, exact]
        description: "Synchronisation policy"
      queue_size:
        type: integer
        minimum: 1
        description: "Size of the message queue per topic"
      max_interval:
        type: number
        exclusiveMinimum: 0
        description: "Maximum time difference (seconds) between messages. Only valid with approximate policy."
      topics:
        type: array
        description: "Topics to synchronise"
        items:
          $ref: "#/$defs/syncGroupTopic"
        minItems: 2
        maxItems: 9

  syncGroupTopic:
    type: object
    description: "A topic within a sync group"
    required:
      - topic
      - type
      - qos
    additionalProperties: false
    properties:
      topic:
        $ref: "#/$defs/topicNameWithParams"
        description: "Topic name (may contain ${param:name} references)"
      type:
        $ref: "#/$defs/rosMessageType"
        description: "ROS message type"
      qos:
        $ref: "#/$defs/qos"
        description: "QoS configuration"

  service:
    type: object
    description: Service server definition
    required:
      - name
      - type
    additionalProperties: false
    properties:
      name:
        $ref: "#/$defs/topicNameWithParams"
        description: Service name (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when name contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosServiceType"
        description: ROS service type
      manually_created:
        type: boolean
        description: If true, skip code generation for this service (for documentation only)
        default: false

  serviceClient:
    type: object
    description: Service client definition
    required:
      - name
      - type
    additionalProperties: false
    properties:
      name:
        $ref: "#/$defs/topicNameWithParams"
        description: Service name to connect to (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when name contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosServiceType"
        description: ROS service type
      manually_created:
        type: boolean
        description: If true, skip code generation for this service client (for documentation only)
        default: false

  action:
    type: object
    description: Action server definition
    required:
      - name
      - type
    additionalProperties: false
    properties:
      name:
        $ref: "#/$defs/topicNameWithParams"
        description: Action name (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when name contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosActionType"
        description: ROS action type
      manually_created:
        type: boolean
        description: If true, skip code generation for this action server (for documentation only)
        default: false

  actionClient:
    type: object
    description: Action client definition
    required:
      - name
      - type
    additionalProperties: false
    properties:
      name:
        $ref: "#/$defs/topicNameWithParams"
        description: Action name to connect to (may contain ${param:name} references)
      field_name:
        type: string
        description: "C++ field name. Required when name contains ${param:...}"
        pattern: '^[a-zA-Z_][a-zA-Z0-9_]*$'
      type:
        $ref: "#/$defs/rosActionType"
        description: ROS action type
      manually_created:
        type: boolean
        description: If true, skip code generation for this action client (for documentation only)
        default: false

  tf:
    type: object
    description: "TF2 transform support. Creates tf2 buffer and optionally listener, broadcaster, static broadcaster."
    additionalProperties: false
    properties:
      listener:
        type: boolean
        description: "Create tf2_ros::Buffer and tf2_ros::TransformListener"
        default: false
      broadcaster:
        type: boolean
        description: "Create tf2_ros::TransformBroadcaster"
        default: false
      static_broadcaster:
        type: boolean
        description: "Create tf2_ros::StaticTransformBroadcaster"
        default: false
